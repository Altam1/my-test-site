<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login · </title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Noto Sans', 'PingFang SC', Roboto, 'Microsoft YaHei', sans-serif; }
        body {
            background: linear-gradient(135deg, #f5efe7 0%, #e8d9c8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: #fffcf7;
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-card h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #b35f1a, #8b3c0c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
        }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #5e3a1f; }
        .input-group input {
            width: 100%; padding: 12px 16px; border-radius: 60px; border: 1px solid #dbcbb8;
            background: white; font-size: 1rem; transition: 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #c67b3c; box-shadow: 0 0 0 3px rgba(198,123,60,0.2); }
        button {
            width: 100%; background: #c67b3c; border: none; padding: 12px; border-radius: 60px;
            font-weight: 600; color: white; font-size: 1rem; cursor: pointer; margin-top: 8px; transition: 0.2s;
        }
        button.secondary { background: #b0a088; }
        button:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .toggle-link { color: #c67b3c; cursor: pointer; text-decoration: underline; margin-top: 16px; display: inline-block; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #b0a088; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2d5c0; }
        .error-msg { background: #ffe0db; color: #b13e2a; padding: 10px; border-radius: 40px; margin-bottom: 16px; font-size: 0.85rem; display: none; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #c67b3c; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .feedback-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2d5c0; }
        .feedback-section h4 { margin-bottom: 10px; color: #5e3a1f; }
        .feedback-section textarea { width: 100%; border-radius: 24px; border: 1px solid #dbcbb8; padding: 12px; resize: vertical; background: white; font-family: inherit; }
        .feedback-section button.small { width: auto; padding: 8px 20px; margin-top: 8px; }
        .feedback-status { font-size: 0.75rem; margin-top: 6px; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>📖  Brain Gym</h1>
    <div id="errorMsg" class="error-msg"></div>

    <!-- Login Form -->
    <div id="loginForm">
        <div class="input-group">
            <label>📧 Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="input-group">
            <label>🔒 Password</label>
            <input type="password" id="loginPassword" placeholder="••••••">
        </div>
        <button id="loginBtn">Sign in</button>
        <div><span class="toggle-link" id="showSignup">➕ Create new account</span></div>
        <div class="divider">or</div>
        <button id="guestBtn" class="secondary">👤 Continue as Guest</button>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" style="display: none;">
        <div class="input-group">
            <label>👤 Full Name</label>
            <input type="text" id="signupName" placeholder="Your name">
        </div>
        <div class="input-group">
            <label>📧 Email</label>
            <input type="email" id="signupEmail" placeholder="your@email.com">
        </div>
        <div class="input-group">
            <label>🔒 Password (min 6 characters)</label>
            <input type="password" id="signupPassword" placeholder="••••••">
        </div>
        <button id="signupBtn">Create account</button>
        <div><span class="toggle-link" id="showLogin">🔙 Back to Sign in</span></div>
        <div class="divider">or</div>
        <button id="guestBtn2" class="secondary">👤 Continue as Guest</button>
    </div>

    <!-- Feedback Section -->
    <div class="feedback-section">
        <h4>📬 Send Feedback or Report Issue</h4>
        <textarea id="feedbackText" rows="2" placeholder="Describe your issue or suggestion..."></textarea>
        <button id="sendFeedbackBtn" class="small secondary" style="background:#c67b3c;">Send Feedback</button>
        <div id="feedbackStatus" class="feedback-status"></div>
    </div>
</div>

<script type="module">
    import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, db, doc, setDoc, collection, addDoc } from './firebase-config.js';
    function showError(msg) {
        const div = document.getElementById('errorMsg');
        div.innerText = msg;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 4000);
    }

    function setLoading(btnId, isLoading) {
        const btn = document.getElementById(btnId);
        if (isLoading) {
            btn.innerHTML = '<span class="loading"></span> Processing...';
            btn.disabled = true;
        } else {
            if (btnId === 'loginBtn') btn.innerHTML = 'Sign in';
            else if (btnId === 'signupBtn') btn.innerHTML = 'Create account';
            else if (btnId === 'guestBtn' || btnId === 'guestBtn2') btn.innerHTML = 'Continue as Guest';
            btn.disabled = false;
        }
    }

    // LOGIN
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showError('Please enter email and password'); return; }
        setLoading('loginBtn', true);
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            localStorage.setItem('ch_current_user', JSON.stringify({
                uid: user.uid, email: user.email, name: user.displayName || email.split('@')[0], isGuest: false
            }));
            window.location.href = 'index.html';
        } catch (error) {
            let msg = 'Login failed';
            if (error.code === 'auth/user-not-found') msg = '❌ Email not registered';
            else if (error.code === 'auth/wrong-password') msg = '❌ Incorrect password';
            else if (error.code === 'auth/invalid-email') msg = '❌ Invalid email format';
            else msg = error.message;
            showError(msg);
        } finally { setLoading('loginBtn', false); }
    });

    // SIGNUP
    document.getElementById('signupBtn').addEventListener('click', async () => {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        if (!name || !email || !password) { showError('Please fill all fields'); return; }
        if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
        setLoading('signupBtn', true);
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            await updateProfile(user, { displayName: name });
            await setDoc(doc(db, 'users', user.uid), {
                name: name, email: email, createdAt: new Date().toISOString(),
                allQuestions: [], correctIds: [], wrongIds: [],
                selectedGroup: "all", selectedSubgroup: "all"
            });
            localStorage.setItem('ch_current_user', JSON.stringify({
                uid: user.uid, email: user.email, name: name, isGuest: false
            }));
            window.location.href = 'index.html';
        } catch (error) {
            let msg = 'Signup failed';
            if (error.code === 'auth/email-already-in-use') msg = '⚠️ Email already registered';
            else if (error.code === 'auth/invalid-email') msg = '❌ Invalid email address';
            else if (error.code === 'auth/weak-password') msg = '❌ Password too weak (min 6 chars)';
            else msg = error.message;
            showError(msg);
        } finally { setLoading('signupBtn', false); }
    });

    // GUEST
    function guestLogin() {
        const guestId = `guest_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
        localStorage.setItem('ch_current_user', JSON.stringify({
            uid: guestId, isGuest: true, name: 'Guest', loginTime: Date.now()
        }));
        window.location.href = 'index.html';
    }
    document.getElementById('guestBtn').addEventListener('click', guestLogin);
    document.getElementById('guestBtn2').addEventListener('click', guestLogin);

    // TOGGLE FORMS
    document.getElementById('showSignup').addEventListener('click', () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
    });
    document.getElementById('showLogin').addEventListener('click', () => {
        document.getElementById('signupForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    });

    // SEND FEEDBACK
    document.getElementById('sendFeedbackBtn').addEventListener('click', async () => {
        const msg = document.getElementById('feedbackText').value.trim();
        const statusDiv = document.getElementById('feedbackStatus');
        if (!msg) { statusDiv.innerHTML = '<span style="color:#b13e2a;">Please write something first.</span>'; return; }
        statusDiv.innerHTML = '<span>Sending...</span>';
        try {
            await addDoc(collection(db, 'feedback'), {
                message: msg,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            });
            document.getElementById('feedbackText').value = '';
            statusDiv.innerHTML = '<span style="color:#2d5a1e;">✅ Thank you! Feedback sent.</span>';
            setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
        } catch(e) {
            statusDiv.innerHTML = '<span style="color:#b13e2a;">❌ Failed to send. Please try again.</span>';
            console.error(e);
        }
    });
</script>
</body>
</html>
