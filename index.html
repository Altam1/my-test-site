<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>华夏知韵 · 自测学习库 | 持久化存储 + 题目编辑</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Noto Sans', 'PingFang SC', Roboto, 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f5efe7;
            margin: 0;
            padding: 20px;
            color: #2c2b28;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #b35f1a, #8b3c0c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
        }
        .sub {
            color: #6c5a46;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2d5c0;
            padding-bottom: 8px;
        }
        .tab-btn {
            background: #ede3d4;
            border: none;
            padding: 8px 22px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: #5e3a1f;
        }
        .tab-btn.active {
            background: #c67b3c;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .panel {
            display: none;
            background: #fffcf7;
            border-radius: 36px;
            padding: 24px 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            animation: fade 0.2s ease;
        }
        .panel.active-panel {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .quiz-card {
            background: #fef7e8;
            border-radius: 32px;
            padding: 20px 28px;
            border: 1px solid #f0e2d0;
            margin-bottom: 28px;
        }
        .question-img {
            background: #f3ede5;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #9b7a5c;
            border-left: 6px solid #c67b3c;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 16px 0 12px;
            line-height: 1.4;
        }
        .answer-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }
        .answer-input {
            flex: 3;
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 60px;
            border: 1px solid #dbcbb8;
            background: white;
            transition: 0.2s;
        }
        .answer-input:focus {
            border-color: #c67b3c;
            outline: none;
            box-shadow: 0 0 0 2px rgba(198,123,60,0.2);
        }
        button {
            background: #c67b3c;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        button.secondary {
            background: #b0a088;
        }
        button.warning {
            background: #a55c2e;
        }
        button.small {
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        button:hover {
            filter: brightness(0.92);
            transform: translateY(-1px);
        }
        .feedback {
            background: #e9e1d5;
            border-radius: 28px;
            padding: 12px 20px;
            margin-top: 12px;
            font-weight: 500;
        }
        .correct-fb { background: #d9efcf; color: #2d5a1e; border-left: 6px solid #3e9c2c; }
        .wrong-fb { background: #ffe0db; color: #b13e2a; border-left: 6px solid #dc5c3c; }
        .stats {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            flex-wrap: wrap;
            background: #ede3d4;
            border-radius: 48px;
            padding: 12px 20px;
            margin-bottom: 20px;
        }
        .question-list {
            max-height: 480px;
            overflow-y: auto;
            border-top: 1px solid #e2d2c0;
            margin-top: 16px;
        }
        .list-item {
            background: #fef6ed;
            margin: 12px 0;
            padding: 12px 16px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .list-qtext {
            flex: 1;
            font-weight: 500;
            word-break: break-word;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 28px;
            border: 1px solid #dacfb8;
            background: #fffaf2;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 700px) {
            .panel { padding: 16px; }
            .question-text { font-size: 1.2rem; }
            .grid-2col { grid-template-columns: 1fr; }
        }
        hr {
            margin: 20px 0;
            border-color: #eee2d2;
        }
        .category-tag {
            background: #e7dccf;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        .edit-buttons {
            display: flex;
            gap: 8px;
        }
        .search-box {
            margin-bottom: 16px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📖 华夏知韵 · 自测学习库</h1>
        <div class="sub">所有数据自动保存 · 可编辑题目 · 永不丢失</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="learn">📝 开始学习</button>
        <button class="tab-btn" data-tab="wrong">📘 没答对的地方</button>
        <button class="tab-btn" data-tab="correct">✅ 答对的地方</button>
        <button class="tab-btn" data-tab="manage">✏️ 管理题库</button>
        <button class="tab-btn" data-tab="add">➕ 添加新题</button>
    </div>

    <!-- 学习面板 -->
    <div id="learnPanel" class="panel active-panel">
        <div class="stats">
            <span>📚 总题库: <strong id="totalCount">0</strong></span>
            <span>✅ 已答对: <strong id="correctCount">0</strong></span>
            <span>❌ 待巩固: <strong id="wrongCount">0</strong></span>
            <button id="resetStudyStats" class="small secondary">🗑️ 重置学习记录</button>
        </div>
        <div class="quiz-card" id="quizArea">
            <div id="questionImageArea" class="question-img">🖼️ 知识配图 · 文化专题</div>
            <div class="question-text" id="questionText">加载题目中...</div>
            <div class="answer-input-area">
                <input type="text" id="answerInput" class="answer-input" placeholder="输入你的答案 (判断题填“正确/错误”, 多选用逗号隔开)" autocomplete="off">
                <button id="submitAnswer">提交答案</button>
                <button id="nextQuestion" class="secondary">下一题 ➡️</button>
            </div>
            <div id="feedbackMsg" class="feedback"></div>
        </div>
        <div style="font-size:0.8rem; text-align:center; color:#a68e72;">💡 每轮学习每个题目只出现一次，答对后不再重复，答错也会移出本轮（可去错题本练习）。所有数据自动保存。</div>
    </div>

    <!-- 错题本 -->
    <div id="wrongPanel" class="panel">
        <h3>📕 没答对的题目 <button id="practiceWrongBtn" class="small" style="margin-left: 12px;">✍️ 练习错题本</button></h3>
        <div id="wrongListContainer" class="question-list">加载中...</div>
    </div>

    <!-- 答对的地方 -->
    <div id="correctPanel" class="panel">
        <h3>✅ 答对题库 <button id="clearAllCorrectBtn" class="small warning" style="margin-left: 12px;">清空答对记录</button></h3>
        <div id="correctListContainer" class="question-list">加载中...</div>
    </div>

    <!-- 管理题库（编辑/删除题目） -->
    <div id="managePanel" class="panel">
        <h3>✏️ 编辑或删除已有题目 (修改后自动保存)</h3>
        <div class="search-box">
            <input type="text" id="searchQuestionInput" placeholder="🔍 搜索题目关键词...">
        </div>
        <div id="allQuestionsList" class="question-list">加载中...</div>
    </div>

    <!-- 添加新题目 -->
    <div id="addPanel" class="panel">
        <h3>➕ 添加新知识 / 新题目</h3>
        <div class="grid-2col">
            <div class="form-group">
                <label>问题 / 题干</label>
                <input type="text" id="newQuestion" placeholder="例：中国有多少个省级行政区？">
            </div>
            <div class="form-group">
                <label>标准答案 (多个答案用分号;隔开)</label>
                <input type="text" id="newAnswer" placeholder="例：34个;三十四个">
            </div>
            <div class="form-group">
                <label>类别</label>
                <input type="text" id="newCategory" placeholder="地理 / 历史 / 文化 / 生词 ...">
            </div>
            <div class="form-group">
                <label>图片描述(仅示意)</label>
                <input type="text" id="newImageDesc" placeholder="例如: 地图图标">
            </div>
        </div>
        <button id="addQuestionBtn">📌 添加到总题库</button>
        <hr>
        <h4>📂 现有类别一览</h4>
        <div id="categoryList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
    </div>
</div>

<script>
    // ---------- 默认内置题库（初始数据）----------
    const DEFAULT_QUESTIONS_RAW = [
        // === 第一部分：单题 + 地理/历史/文化基础 ===
        { text: "中国的邻国有14个（朝鲜、俄罗斯、蒙古、哈萨克斯坦、吉尔吉斯斯坦、塔吉克斯坦、阿富汗、巴基斯坦、印度、尼泊尔、不丹、缅甸、老挝、越南），其中不是中国的邻国是？", answers: ["日本","菲律宾","印度尼西亚","马来西亚"], category: "地理", imageHint: "🗺️ 邻国地图" },
        { text: "中国第一大岛是？", answers: ["台湾","台湾岛","Taiwan"], category: "地理", imageHint: "🏝️ 岛屿示意" },
        { text: "中国人常常把哪条河流称作“母亲河”？", answers: ["黄河","the Yellow River"], category: "地理", imageHint: "🏞️ 河流分布" },
        { text: "中国文明以什么为核心和代表？", answers: ["儒家文化","儒家","儒教","Confucian culture"], category: "哲学", imageHint: "🧧 思想传承" },
        { text: "中国是一个统一的多民族国家，有多少个民族？", answers: ["56个","56","五十六"], category: "社会", imageHint: "👥 民族统计" },
        { text: "中国共有多少大方音区？", answers: ["七大方音区","7个","七","7"], category: "语言", imageHint: "🗣️ 方言地图" },
        { text: "哪种宗教是土生土长的中国宗教？", answers: ["道教","道","Taoism"], category: "宗教", imageHint: "☯️ 本土信仰" },
        { text: "汉字是什么文字类型？", answers: ["象形文字","象形","Pictographic script"], category: "语言", imageHint: "✍️ 文字演变" },
        { text: "总体来说，中国地势的分布特点是什么？", answers: ["西高东低","西部高东部低"], category: "地理", imageHint: "⛰️ 地势剖面" },
        { text: "孔子被后世尊为什么？", answers: ["万世师表","至圣先师","The Eternal Teacher for All Ages"], category: "历史", imageHint: "📜 先贤尊称" },
        { text: "通常认为哪条线是南北方的分界线？", answers: ["秦岭—淮河","秦岭淮河","秦岭-淮河一线"], category: "地理", imageHint: "🗺️ 气候分界" },
        { text: "世界上海拔最高的山脉是？", answers: ["喜马拉雅山脉","喜马拉雅山","Himalayas"], category: "地理", imageHint: "🏔️ 最高山脉" },
        { text: "道家学派的创始人是谁？", answers: ["老子","李耳","Laozi"], category: "哲学", imageHint: "☯️ 道家始祖" },
        { text: "北京的地标是什么？", answers: ["天安门广场","天安门","故宫"], category: "建筑", imageHint: "🏛️ 首都象征" },
        { text: "中国历史上建立第一个统一的多民族封建国家的皇帝是谁？", answers: ["秦始皇","嬴政","Qin Shi Huang"], category: "历史", imageHint: "👑 千古一帝" },
        { text: "宇宙中的五行具体指什么？", answers: ["金、木、水、火、土","金木水火土"], category: "哲学", imageHint: "⚙️ 五行学说" },
        { text: "明成祖派谁七次下西洋？", answers: ["郑和","Zheng He"], category: "历史", imageHint: "🚢 航海壮举" },
        { text: "哪部兵书是孙武所写？", answers: ["《孙子兵法》","孙子兵法","孙武兵法","The Art of War"], category: "军事", imageHint: "📖 兵学圣典" },
        { text: "中国最大/最重要的节日是什么？", answers: ["春节","Spring Festival","Chinese New Year"], category: "民俗", imageHint: "🧨 传统佳节" },
        { text: "中国传统文化中最核心的观念之一是什么？", answers: ["天人合一","天人合一思想","Unity of Heaven and Humanity"], category: "哲学", imageHint: "🌿 和谐观念" },
        
        // === 二、多选题 ===
        { text: "中国人常见的书法工具是什么？合称为什么？", answers: ["笔、墨、纸、砚；文房四宝","笔墨纸砚 文房四宝"], category: "艺术", imageHint: "🖌️ 文房用具" },
        { text: "下列节日中，属于中国节日的有哪些？", answers: ["春节,清明节,端午节,中秋节","春节清明端午中秋"], category: "民俗", imageHint: "🎑 传统节日" },
        { text: "汉字有哪两种形式？", answers: ["简体字","繁体字","简体字、繁体字"], category: "语言", imageHint: "📝 汉字形体" },
        { text: "唐朝前期出现了哪两个太平时期？", answers: ["开元盛世","贞观之治","开元盛世、贞观之治"], category: "历史", imageHint: "🏮 大唐盛世" },
        { text: "属于儒家思想代表人物的是？", answers: ["孟子","孔子","孟子、孔子"], category: "哲学", imageHint: "👨‍🎓 儒家先贤" },
        { text: "属于中国传统乐器的有哪些？", answers: ["琵琶","古筝","二胡","琵琶、古筝、二胡"], category: "艺术", imageHint: "🎵 传统乐器" },
        { text: "中国古代四大发明是什么？", answers: ["指南针","造纸术","火药","印刷术","指南针、造纸术、火药、印刷术"], category: "科技", imageHint: "🧭 四大发明" },
        { text: "属于中医常用治疗手段的有？", answers: ["针灸","按摩","针灸、按摩"], category: "医学", imageHint: "🌿 中医技法" },
        { text: "属于京剧中男性角色的有？", answers: ["老生","武生","老生、武生"], category: "艺术", imageHint: "🎭 京剧行当" },
        
        // === 三、判断题/填空题/连线题等 ===
        { text: "儒家经典“四书”是指哪四本书？", answers: ["《中庸》","《大学》","《论语》","《孟子》","中庸、大学、论语、孟子"], category: "经典", imageHint: "📚 儒家四书" },
        { text: "上海特有的民居形式是什么？", answers: ["弄堂","石库门","里弄"], category: "建筑", imageHint: "🏘️ 海派建筑" },
        { text: "《清明上河图》描绘的是清朝繁荣的景象。(正确/错误)", answers: ["错误","错","False"], category: "艺术", imageHint: "🖼️ 名画赏析" },
        { text: "庄子是孔子之后最著名的儒家大师。(正确/错误)", answers: ["错误","错","False"], category: "哲学", imageHint: "📘 道家代表" },
        { text: "谁发明了便利的活字印刷术？", answers: ["毕昇","毕升"], category: "科技", imageHint: "🖨️ 活字印刷" },
        { text: "孔子晚年整理过的书籍，后世称为“五经”，包括哪些？", answers: ["《诗》","《书》","《易》","《礼》","《春秋》","诗、书、易、礼、春秋"], category: "经典", imageHint: "📜 五经" },
        { text: "中国是世界上最早使用纸币的国家。(正确/错误)", answers: ["正确","对","True"], category: "经济", imageHint: "💵 纸币起源" },
        { text: "谁成为世界上第一位把圆周率准确到小数点后六位的人？", answers: ["祖冲之"], category: "科学", imageHint: "🔢 数学成就" },
        { text: "孟子认为，人性本来是恶的。(正确/错误)", answers: ["错误","错","False"], category: "哲学", imageHint: "👶 性善论" },
        { text: "佛教是外来宗教。(正确/错误)", answers: ["正确","对","True"], category: "宗教", imageHint: "🕉️ 宗教传播" },
        { text: "唐朝前期先后出现了“贞观之治”和“开元盛世”。(正确/错误)", answers: ["正确","对","True"], category: "历史", imageHint: "🏵️ 盛世双峰" },
        { text: "《论语》是孔子编写的书籍。(正确/错误)", answers: ["错误","错","False"], category: "经典", imageHint: "📖 弟子编纂" },
        { text: "“休”是形声字。(正确/错误)", answers: ["错误","错","False"], category: "语言", imageHint: "✍️ 会意字例" },
        { text: "“文房四宝”是指什么？", answers: ["笔、墨、纸、砚","笔墨纸砚"], category: "文化", imageHint: "🖌️ 文房四宝" },
        { text: "哪一年中国共产党十一届三中全会提出“改革开放”政策？", answers: ["1978年","1978"], category: "现代史", imageHint: "🇨🇳 伟大转折" },
        { text: "从宋代开始，一种名叫什么纸币已经流通？", answers: ["交子"], category: "经济", imageHint: "💰 纸币先驱" },
        { text: "最早的汉字叫做什么？", answers: ["甲骨文"], category: "文字", imageHint: "🐚 甲骨文字" },
        { text: "哪一年以来的改革开放，使中国经济得到了前所未有的快速增长？", answers: ["1978年","1978"], category: "现代史", imageHint: "📈 改革开放" },
        { text: "中国人数最多的少数民族是？", answers: ["壮族"], category: "民族", imageHint: "🎋 壮族风情" },
        { text: "中国绘画的题材主要有三类：山水、花鸟和人物。其中，哪一类画在中国古代的地位最高？", answers: ["山水画","山水"], category: "艺术", imageHint: "⛰️ 山水意境" },
        { text: "中国人数最多的民族是？", answers: ["汉族"], category: "民族", imageHint: "👪 汉族文化" },
        { text: "黄河全长5500公里，是中国第几长河？", answers: ["第二长河","第二","2"], category: "地理", imageHint: "🌊 母亲河" },
        { text: "香港是哪一年回归中国的？", answers: ["1997年","1997"], category: "近现代", imageHint: "🇭🇰 回归时刻" },
        
        // === 连线题（简称与城市/省份）===

    // 初始化题库（带唯一ID）
    let allQuestions = [];
    let correctIds = [];
    let wrongIds = [];

    // 学习会话不重复队列
    let remainingUnseenIds = [];
    let currentQuestionObj = null;

    // ---------- 存储操作 ----------
    function saveQuestionsToLocal() {
        localStorage.setItem('ch_questions_v2', JSON.stringify(allQuestions));
    }
    function saveCorrectWrong() {
        localStorage.setItem('ch_correct_ids_v2', JSON.stringify(correctIds));
        localStorage.setItem('ch_wrong_ids_v2', JSON.stringify(wrongIds));
    }
    function loadAllData() {
        const storedQuestions = localStorage.getItem('ch_questions_v2');
        if (storedQuestions) {
            allQuestions = JSON.parse(storedQuestions);
        } else {
            // 初次加载，给默认题目分配ID
            allQuestions = DEFAULT_QUESTIONS_RAW.map((q, idx) => ({
                id: Date.now() + idx + Math.random() * 1000,
                text: q.text,
                answers: q.answers,
                category: q.category,
                imageHint: q.imageHint
            }));
            saveQuestionsToLocal();
        }
        const storedCorrect = localStorage.getItem('ch_correct_ids_v2');
        const storedWrong = localStorage.getItem('ch_wrong_ids_v2');
        correctIds = storedCorrect ? JSON.parse(storedCorrect) : [];
        wrongIds = storedWrong ? JSON.parse(storedWrong) : [];
        // 清理无效id（题目被删除后）
        const validIds = new Set(allQuestions.map(q => q.id));
        correctIds = correctIds.filter(id => validIds.has(id));
        wrongIds = wrongIds.filter(id => validIds.has(id));
        saveCorrectWrong();
    }

    function persistAll() {
        saveQuestionsToLocal();
        saveCorrectWrong();
        updateCounters();
        refreshRemainingPool();
    }

    // 刷新剩余未学池（未掌握的题目随机排序）
    function refreshRemainingPool() {
        const notMastered = allQuestions.filter(q => !correctIds.includes(q.id)).map(q => q.id);
        for (let i = notMastered.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [notMastered[i], notMastered[j]] = [notMastered[j], notMastered[i]];
        }
        remainingUnseenIds = notMastered;
    }

    // 从池中获取新题目
    function fetchNewQuestionFromPool() {
        if (remainingUnseenIds.length === 0) {
            const allMastered = allQuestions.length > 0 && allQuestions.every(q => correctIds.includes(q.id));
            if (allMastered && allQuestions.length > 0) {
                return { type: "complete", message: "🎉 恭喜！您已经答对所有题目！点击「重置学习记录」可继续挑战或添加新题。" };
            } else {
                refreshRemainingPool();
                if (remainingUnseenIds.length === 0) return null;
            }
        }
        const nextId = remainingUnseenIds.shift();
        return allQuestions.find(q => q.id === nextId) || null;
    }

    function loadNewQuestion() {
        const newQ = fetchNewQuestionFromPool();
        if (!newQ) {
            document.getElementById('questionText').innerHTML = "✨ 暂无新题目，请添加或重置学习记录。";
            document.getElementById('questionImageArea').innerHTML = "🖼️ 待扩充题库";
            currentQuestionObj = null;
            return;
        }
        if (newQ.type === "complete") {
            document.getElementById('questionText').innerHTML = newQ.message;
            document.getElementById('questionImageArea').innerHTML = "🏆 全科制霸";
            currentQuestionObj = null;
            return;
        }
        currentQuestionObj = newQ;
        document.getElementById('questionText').innerHTML = newQ.text;
        document.getElementById('questionImageArea').innerHTML = `🖼️ 【${newQ.category || '文化'}】 ${newQ.imageHint || '知识配图'}`;
        document.getElementById('answerInput').value = '';
        document.getElementById('feedbackMsg').innerHTML = '';
        document.getElementById('feedbackMsg').className = 'feedback';
    }

    // 答案匹配逻辑
    function normalizeAnswer(str) {
        let s = str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0)).toLowerCase().trim();
        s = s.replace(/[，,、；;《》【】“”''""!！?？·\s]/g, '');
        return s;
    }
    function isAnswerCorrect(userAns, question) {
        let normUser = normalizeAnswer(userAns);
        if (question.text.includes("不是中国的邻国")) {
            const neighborList = ["朝鲜","俄罗斯","蒙古","哈萨克斯坦","吉尔吉斯斯坦","塔吉克斯坦","阿富汗","巴基斯坦","印度","尼泊尔","不丹","缅甸","老挝","越南"];
            const inputClean = normalizeAnswer(userAns);
            const isNeighbor = neighborList.some(nei => normalizeAnswer(nei) === inputClean);
            if (!isNeighbor && inputClean.length > 0) return true;
            for(let std of question.answers) if(normalizeAnswer(std) === inputClean) return true;
            return false;
        }
        for(let std of question.answers) {
            let normStd = normalizeAnswer(std);
            if(normUser === normStd) return true;
            if(normStd.includes(',') && normUser.includes(',')) {
                if(normUser.split(',').sort().join(',') === normStd.split(',').sort().join(',')) return true;
            }
            if(normStd.length>2 && normUser.includes(normStd)) return true;
            if(normUser.length>2 && normStd.includes(normUser)) return true;
            if(question.text.includes("春节有哪些习俗") && (normUser.includes("春联")||normUser.includes("年夜饭")||normUser.includes("团圆"))) return true;
        }
        return false;
    }

    function submitCheck() {
        if (!currentQuestionObj) { showFeedback("没有题目，请点击下一题或重置。", false); return; }
        let userAnswer = document.getElementById('answerInput').value;
        let correct = isAnswerCorrect(userAnswer, currentQuestionObj);
        let qid = currentQuestionObj.id;
        let mainAnswer = currentQuestionObj.answers[0].substring(0, 60);
        if(correct) {
            showFeedback(`✅ 答案正确！已存入“答对的地方”`, true);
            if(!correctIds.includes(qid)) correctIds.push(qid);
            wrongIds = wrongIds.filter(id => id !== qid);
            persistAll();
            remainingUnseenIds = remainingUnseenIds.filter(id => id !== qid);
            loadNewQuestion();
        } else {
            showFeedback(`❌ 答案不对。 参考答案：${mainAnswer}。已存入“没答对的地方”`, false);
            if(!wrongIds.includes(qid)) wrongIds.push(qid);
            correctIds = correctIds.filter(id => id !== qid);
            persistAll();
            remainingUnseenIds = remainingUnseenIds.filter(id => id !== qid);
        }
        updateCounters();
    }
    function showFeedback(msg, isCorrect) {
        let fbDiv = document.getElementById('feedbackMsg');
        fbDiv.innerHTML = msg;
        fbDiv.className = `feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
    }
    function nextQuestionHandler() { loadNewQuestion(); }

    function updateCounters() {
        document.getElementById('totalCount').innerText = allQuestions.length;
        document.getElementById('correctCount').innerText = correctIds.length;
        document.getElementById('wrongCount').innerText = wrongIds.length;
        renderCorrectList();
        renderWrongList();
        renderManageList();
    }

    function renderCorrectList() {
        let container = document.getElementById('correctListContainer');
        let correctQuestions = allQuestions.filter(q => correctIds.includes(q.id));
        if(!correctQuestions.length) { container.innerHTML = '<div>✨ 暂无答对题目</div>'; return; }
        container.innerHTML = correctQuestions.map(q => `<div class="list-item"><span class="list-qtext">📌 ${q.text}</span><button class="small secondary" data-id="${q.id}" data-action="remove-correct">从答对移除</button></div>`).join('');
        attachRemoveCorrectEvents();
    }
    function attachRemoveCorrectEvents() {
        document.querySelectorAll('[data-action="remove-correct"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = Number(btn.dataset.id);
                correctIds = correctIds.filter(i => i !== id);
                persistAll();
                loadNewQuestion();
            });
        });
    }
    function renderWrongList() {
        let container = document.getElementById('wrongListContainer');
        let wrongQuestions = allQuestions.filter(q => wrongIds.includes(q.id));
        if(!wrongQuestions.length) { container.innerHTML = '<div>🎉 暂无错题，继续保持～</div>'; return; }
        container.innerHTML = wrongQuestions.map(q => `<div class="list-item"><span class="list-qtext">❌ ${q.text}</span><button class="small secondary" data-id="${q.id}" data-action="practice-wrong">📖 练习此题</button><button class="small warning" data-id="${q.id}" data-action="remove-wrong">🗑️ 忽略</button></div>`).join('');
        document.querySelectorAll('[data-action="practice-wrong"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = Number(btn.dataset.id);
                let q = allQuestions.find(qq => qq.id === id);
                if(q) { currentQuestionObj = q; document.getElementById('questionText').innerHTML = q.text; document.getElementById('questionImageArea').innerHTML = `🖼️ 【${q.category}】 错题专练`; document.querySelector('[data-tab="learn"]').click(); }
            });
        });
        document.querySelectorAll('[data-action="remove-wrong"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = Number(btn.dataset.id);
                wrongIds = wrongIds.filter(i => i !== id);
                persistAll();
            });
        });
    }

    // 管理题库渲染（带编辑删除）
    function renderManageList() {
        let container = document.getElementById('allQuestionsList');
        let searchTerm = document.getElementById('searchQuestionInput')?.value.toLowerCase() || '';
        let filtered = allQuestions.filter(q => q.text.toLowerCase().includes(searchTerm));
        if(!filtered.length) { container.innerHTML = '<div>📭 没有找到题目</div>'; return; }
        container.innerHTML = filtered.map(q => `
            <div class="list-item" data-qid="${q.id}">
                <span class="list-qtext"><strong>${q.text}</strong><br><span style="font-size:0.75rem;">类别: ${q.category} | 答案: ${q.answers.join('; ').substring(0,50)}${q.answers.join(';').length>50?'…':''}</span></span>
                <div class="edit-buttons">
                    <button class="small secondary edit-q-btn" data-id="${q.id}">✏️ 编辑</button>
                    <button class="small warning delete-q-btn" data-id="${q.id}">🗑️ 删除</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.edit-q-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = Number(btn.dataset.id);
                let q = allQuestions.find(qq => qq.id === id);
                if(q) {
                    let newText = prompt("编辑问题:", q.text);
                    if(newText && newText.trim()) q.text = newText.trim();
                    let newAnswers = prompt("编辑答案 (多个用分号隔开):", q.answers.join(';'));
                    if(newAnswers && newAnswers.trim()) q.answers = newAnswers.split(';').map(s=>s.trim()).filter(s=>s);
                    let newCat = prompt("编辑类别:", q.category);
                    if(newCat !== null) q.category = newCat.trim() || "未分类";
                    let newImg = prompt("图片描述:", q.imageHint);
                    if(newImg !== null) q.imageHint = newImg.trim() || "📌";
                    persistAll();
                    renderManageList();
                    renderCorrectList(); renderWrongList();
                    refreshRemainingPool();
                    loadNewQuestion();
                }
            });
        });
        document.querySelectorAll('.delete-q-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(confirm("确定删除此题吗？相关学习记录也会清除。")) {
                    let id = Number(btn.dataset.id);
                    allQuestions = allQuestions.filter(q => q.id !== id);
                    correctIds = correctIds.filter(i => i !== id);
                    wrongIds = wrongIds.filter(i => i !== id);
                    persistAll();
                    renderManageList();
                    updateCounters();
                    refreshRemainingPool();
                    loadNewQuestion();
                }
            });
        });
    }

    function addNewQuestion() {
        let qtext = document.getElementById('newQuestion').value.trim();
        let ansRaw = document.getElementById('newAnswer').value.trim();
        let cat = document.getElementById('newCategory').value.trim() || "自定义";
        let img = document.getElementById('newImageDesc').value.trim() || "📌 新知识";
        if(!qtext || !ansRaw) { alert("请填写问题和答案"); return; }
        const newId = Date.now() + Math.random();
        allQuestions.push({
            id: newId,
            text: qtext,
            answers: ansRaw.split(';').map(s=>s.trim()),
            category: cat,
            imageHint: img
        });
        persistAll();
        document.getElementById('newQuestion').value = '';
        document.getElementById('newAnswer').value = '';
        document.getElementById('newCategory').value = '';
        document.getElementById('newImageDesc').value = '';
        refreshRemainingPool();
        loadNewQuestion();
        updateCounters();
        renderCategoryHint();
        alert("新题目已添加！");
    }
    function renderCategoryHint() {
        let cats = [...new Set(allQuestions.map(q=>q.category))];
        document.getElementById('categoryList').innerHTML = cats.map(c=>`<span class="category-tag">#${c}</span>`).join('');
    }
    function resetStats() {
        correctIds = [];
        wrongIds = [];
        persistAll();
        refreshRemainingPool();
        loadNewQuestion();
        alert("学习记录已重置，所有题目重新加入练习队列");
    }

    // 事件绑定与初始化
    function init() {
        loadAllData();
        refreshRemainingPool();
        loadNewQuestion();
        updateCounters();
        renderCategoryHint();
        document.getElementById('submitAnswer').addEventListener('click', submitCheck);
        document.getElementById('nextQuestion').addEventListener('click', nextQuestionHandler);
        document.getElementById('resetStudyStats').addEventListener('click', resetStats);
        document.getElementById('practiceWrongBtn').addEventListener('click', () => { let wrongList = allQuestions.filter(q=>wrongIds.includes(q.id)); if(wrongList.length) { currentQuestionObj = wrongList[0]; document.getElementById('questionText').innerHTML = currentQuestionObj.text; document.getElementById('questionImageArea').innerHTML = `🖼️ 【${currentQuestionObj.category}】 错题专练`; document.querySelector('[data-tab="learn"]').click(); } else alert('暂无错题'); });
        document.getElementById('clearAllCorrectBtn').addEventListener('click', () => { correctIds = []; persistAll(); refreshRemainingPool(); loadNewQuestion(); });
        document.getElementById('addQuestionBtn').addEventListener('click', addNewQuestion);
        document.getElementById('searchQuestionInput').addEventListener('input', () => renderManageList());
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active-panel'));
                document.getElementById(btn.dataset.tab + 'Panel').classList.add('active-panel');
                if(btn.dataset.tab === 'manage') renderManageList();
                if(btn.dataset.tab === 'correct') renderCorrectList();
                if(btn.dataset.tab === 'wrong') renderWrongList();
            });
        });
    }
    init();
</script>
</body>
</html>
